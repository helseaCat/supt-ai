[app]
name = "supt-ai"
log_level = "INFO"

[output]
# Destinations for review output. Pluggable — add more adapters as needed.
# Options: "github", "discord", "console"
destinations = ["discord", "console"]

[discord]
# Webhook URL loaded from Secrets Manager at runtime
# Format: embed with PR title, summary, findings, and link
embed_color = 5814783  # blurple

[github]
# GitHub output settings (used when "github" is in destinations)
# post_as = "comment"  # "comment" or "review"

[pr_agent]
# PR-Agent configuration — passed as env vars / settings overrides at runtime
git_provider = "github"
publish_output = false      # don't post to GitHub yet, capture output locally
verbosity_level = 2         # print full results to console

# LLM model — placeholder until Bedrock/Grok is configured
model = ""

# GitHub token loaded from env: GITHUB_TOKEN
# AWS credentials loaded from env: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION
