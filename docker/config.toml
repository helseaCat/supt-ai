[app]
name = "supt-ai"
log_level = "INFO"

[output]
# Destinations for review output. Pluggable — add more adapters as needed.
# Options: "github", "discord", "console"
destinations = ["discord", "console"]

[discord]
# Webhook URL loaded from Secrets Manager at runtime
# Format: embed with PR title, summary, findings, and link
embed_color = 5814783  # blurple

[github]
# GitHub output settings (used when "github" is in destinations)
# post_as = "comment"  # "comment" or "review"
